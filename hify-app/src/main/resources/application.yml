server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: hify
  main:
    banner-mode: "off"
  mvc:
    servlet:
      load-on-startup: 1

  datasource:
    url: jdbc:mysql://localhost:3306/hify?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    banner: false
    db-config:
      id-type: auto

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json

resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

logging:
  level:
    root: INFO
    com.hify: DEBUG

hify:
  knowledge:
    storage-path: ${HIFY_KNOWLEDGE_STORAGE_PATH:data/knowledge}
    vector:
      jdbc-url: ${PGVECTOR_JDBC_URL:jdbc:postgresql://localhost:5432/hify_vector}
      username: ${PGVECTOR_USER:postgres}
      password: ${PGVECTOR_PASSWORD:123456}
      maximum-pool-size: 5
      connection-timeout-ms: 3000
      ivfflat-lists: 100
      probes: 10
